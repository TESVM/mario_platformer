<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mario-Style Platformer</title>
  <style>
    :root {
      --bg: #091420;
      --panel: #102032;
      --text: #f4f8ff;
      --accent: #ffd447;
      --btn: #23384d;
      --btn-active: #325777;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #183a56, var(--bg) 60%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .wrap {
      width: min(100%, 1040px);
      display: grid;
      gap: 12px;
    }
    .title {
      margin: 0;
      font-size: clamp(1.05rem, 2.5vw, 1.4rem);
      letter-spacing: 0.04em;
    }
    .panel {
      background: color-mix(in srgb, var(--panel) 92%, black);
      border: 1px solid #2d4760;
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 12px 30px #00000055;
    }
    canvas {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 10px;
      border: 1px solid #355777;
      background: #6cc4ff;
      image-rendering: pixelated;
    }
    .hud {
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 0.95rem;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(74px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .btn {
      border: 1px solid #4b6d89;
      background: var(--btn);
      color: var(--text);
      border-radius: 10px;
      min-height: 46px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .btn.active { background: var(--btn-active); }
    .hint { opacity: 0.9; font-size: 0.9rem; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1 class="title">Mario-Style Platformer (Web)</h1>
    <section class="panel">
      <canvas id="game" width="960" height="540" aria-label="platformer game"></canvas>
      <div class="hud">
        <div id="leftHud">Loading assets...</div>
        <div class="hint">Keyboard: Arrow keys / A D + Space | R reset</div>
      </div>
      <div class="controls" aria-label="touch controls">
        <button class="btn" id="leftBtn">LEFT</button>
        <button class="btn" id="jumpBtn">JUMP</button>
        <button class="btn" id="rightBtn">RIGHT</button>
      </div>
    </section>
  </main>
  <script src="game.js"></script>
</body>
</html>
